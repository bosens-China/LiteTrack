services:
  postgres:
    image: postgres:16-alpine
    container_name: litetrack-postgres
    environment:
      POSTGRES_USER: litetrack
      POSTGRES_PASSWORD: litetrack_password
      POSTGRES_DB: litetrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # 生产环境通常不需要暴露数据库端口，如需调试可以取消注释
    # ports:
    #   - "25432:5432"

  redis:
    image: redis:7-alpine
    container_name: litetrack-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # 同样建议仅在内网使用，如需调试可以开放端口
    # ports:
    #   - "26379:6379"

  server:
    image: boses/litetrack-server:latest
    # 如需本地构建镜像，可以取消下方 build，并在本地构建：
    # build:
    #   context: .
    #   dockerfile: ./apps/server/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      # 数据库（生产环境请改为真实密码）
      DATABASE_URL: postgresql://litetrack:litetrack_password@postgres:5432/litetrack
      # Redis
      REDIS_URL: redis://redis:6379
      # JWT，生产环境务必使用强随机值
      JWT_SECRET: ${JWT_SECRET}
      # GitHub OAuth（生产环境必填）
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      # 时区
      APP_TIMEZONE: Asia/Shanghai
      # 服务端口
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
    expose:
      # 仅在 compose 内网暴露给 admin(Nginx) 反代
      - "3000"
    restart: unless-stopped

  admin:
    image: boses/litetrack-admin:latest
    # 也可以本地 build：
    # build:
    #   context: .
    #   dockerfile: ./apps/admin/Dockerfile
    depends_on:
      - server
    ports:
      # 对外暴露统一入口（前端 + /litetrack 反代）
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

