name: Build & Publish Docker Images and SDK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: true
          tags: |
            boses/litetrack-server:latest
            boses/litetrack-server:${{ github.sha }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/admin
          push: true
          tags: |
            boses/litetrack-admin:latest
            boses/litetrack-admin:${{ github.sha }}

  sdk:
    name: Build SDK and push dist
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm -C apps/sdk build

      - name: Commit and push SDK dist if changed
        run: |
          if git status --porcelain apps/sdk/dist | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/sdk/dist
            git commit -m "chore: build sdk dist"
            git push
          else
            echo "No changes in apps/sdk/dist, skipping commit."
          fi
