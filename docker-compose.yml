services:
  postgres:
    image: postgres:16-alpine
    container_name: litetrack-postgres
    environment:
      POSTGRES_USER: litetrack
      POSTGRES_PASSWORD: litetrack_password
      POSTGRES_DB: litetrack
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litetrack -d litetrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: litetrack-redis
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
